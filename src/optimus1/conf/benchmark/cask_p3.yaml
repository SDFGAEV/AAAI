# @package _global_
# ACT-RL E3: Strict Frozen Main Evaluation — 36 tasks x 8 seeds x 7 methods = 2016 episodes
# Groups: crafting(8) mining(7) exploration(6) tech_tree(7) failure_recovery(4) interaction_stress(4)
env:
  name: CASKTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
# ═══ Crafting / Tool Use (8) ═══
- id: 0
  type: craft
  instruction: Craft oak planks from oak logs.
  goal: craft_oak_planks
  group: crafting
- id: 1
  type: craft
  instruction: Craft a crafting table.
  goal: craft_the_crafting_table
  group: crafting
- id: 2
  type: craft
  instruction: Craft a ladder using sticks.
  goal: craft_ladder
  group: crafting
- id: 3
  type: craft
  instruction: Craft a furnace using 8 cobblestone.
  goal: craft_smelting
  group: crafting
- id: 4
  type: smelt
  instruction: Smelt raw beef in a furnace to get cooked beef.
  goal: smelt_beef
  group: crafting
- id: 5
  type: use
  instruction: Use a shield to block an attack.
  goal: use_shield
  group: crafting
- id: 6
  type: use
  instruction: Use a bow to shoot a target.
  goal: use_bow
  group: crafting
- id: 7
  type: craft
  instruction: Craft a stonecutter using iron ingot and stone.
  goal: craft_stonecutter
  group: crafting

# ═══ Mining / Collecting (7) ═══
- id: 8
  type: collect
  instruction: Collect 8 wood logs by chopping trees.
  goal: mine_wood
  group: mining
- id: 9
  type: mine
  instruction: Mine 3 iron ore using a stone pickaxe or better.
  goal: mine_iron_ore
  group: mining
- id: 10
  type: mine
  instruction: Mine diamond ore using an iron pickaxe or better.
  goal: mine_diamond_ore
  group: mining
- id: 11
  type: mine
  instruction: Mine obsidian using a diamond pickaxe.
  goal: mine_obsidian
  group: mining
- id: 12
  type: collect
  instruction: Collect 8 blocks of dirt.
  goal: mine_dirt
  group: mining
- id: 13
  type: collect
  instruction: Collect 8 blocks of grass.
  goal: mine_grass
  group: mining
- id: 14
  type: collect
  instruction: Collect 3 wool by shearing or killing sheep.
  goal: collect_wool
  group: mining

# ═══ Exploration / Finding (6) ═══
- id: 15
  type: find
  instruction: Find diamond ore somewhere underground.
  goal: find_diamond
  group: exploration
- id: 16
  type: find
  instruction: Find lava somewhere underground or on the surface.
  goal: find_lava
  group: exploration
- id: 17
  type: find
  instruction: Find a village somewhere in the world.
  goal: find_village
  group: exploration
- id: 18
  type: find
  instruction: Find a forest biome.
  goal: find_forest
  group: exploration
- id: 19
  type: explore
  instruction: Explore the world by traveling across various biomes and finding interesting locations.
  goal: explore_chest
  group: exploration
- id: 20
  type: explore
  instruction: Explore and climb a mountain or tall structure.
  goal: explore_climb
  group: exploration

# ═══ Long-Horizon / Tech Tree (7) ═══
- id: 21
  type: build
  instruction: Build a nether portal using obsidian blocks and activate it with flint and steel.
  goal: build_nether_portal
  group: tech_tree
- id: 22
  type: craft
  instruction: Build a ladder from sticks and place it.
  goal: build_a_ladder
  group: tech_tree
- id: 23
  type: build
  instruction: Build a tall tower using any blocks.
  goal: build_a_tower
  group: tech_tree
- id: 24
  type: craft
  instruction: Tech tree: from barehand to wooden sword.
  goal: techtree_barehand_to_wooden_sword
  group: tech_tree
- id: 25
  type: craft
  instruction: Tech tree: from barehand to diamond sword.
  goal: techtree_barehand_to_diamond_sword
  group: tech_tree
- id: 26
  type: craft
  instruction: XENON diamond benchmark.
  goal: xenon_diamond_benchmark
  group: tech_tree
- id: 27
  type: mine
  instruction: Obtain obsidian: craft diamond pickaxe, find lava, mine obsidian.
  goal: obtain_obsidian_chain
  group: tech_tree

# ═══ Failure Recovery (4) ═══
- id: 28
  type: mine
  instruction: Attempt to mine iron ore with a wooden pickaxe. Discover you need stone. Switch and mine.
  goal: wrong_tool_mine_iron
  group: failure_recovery
- id: 29
  type: mine
  instruction: Attempt to mine diamond ore with a stone pickaxe. Discover you need iron. Switch and mine.
  goal: wrong_tool_mine_diamond
  group: failure_recovery
- id: 30
  type: smelt
  instruction: Attempt to smelt iron without fuel. Gather coal or wood, then smelt.
  goal: missing_fuel_before_smelting
  group: failure_recovery
- id: 31
  type: craft
  instruction: Attempt to craft a stone pickaxe without a crafting table. Learn you need one first.
  goal: missing_table_for_crafting
  group: failure_recovery

# ═══ Interaction Stress (4) ═══
- id: 32
  type: craft
  instruction: You have only 8 cobblestone. Both a furnace and a stone pickaxe need cobblestone. Choose wisely.
  goal: limited_cobblestone_pickaxe_vs_furnace
  group: interaction_stress
- id: 33
  type: craft
  instruction: You have limited coal. Use it either for torches or as furnace fuel.
  goal: coal_torch_vs_fuel
  group: interaction_stress
- id: 34
  type: craft
  instruction: You have only 1 iron ingot. Craft either an iron pickaxe or an iron sword.
  goal: limited_iron_pickaxe_vs_sword
  group: interaction_stress
- id: 35
  type: craft
  instruction: Diamond chain resource conflict: limited resources force choices between tools.
  goal: diamond_chain_resource_conflict
  group: interaction_stress

evaluate: []
