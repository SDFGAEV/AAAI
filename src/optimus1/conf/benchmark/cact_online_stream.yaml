# @package _global_
defaults:
  - _self_
# C-ACT E5: Online stream tasks — 20 tasks per round for accumulation
env:
  name: CACTTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
- {id: 0,  type: craft,   instruction: "Craft oak planks from oak logs.",                                       goal: oak_planks,       group: crafting,    difficulty: easy}
- {id: 1,  type: craft,   instruction: "Craft a crafting table from planks.",                                 goal: crafting_table,   group: crafting,    difficulty: easy}
- {id: 2,  type: craft,   instruction: "Craft a ladder using sticks.",                                        goal: ladder,           group: crafting,    difficulty: easy}
- {id: 3,  type: smelt,   instruction: "Smelt raw beef in a furnace to get cooked beef.",                      goal: cooked_beef,      group: crafting,    difficulty: medium}
- {id: 4,  type: collect, instruction: "Collect 8 wood logs by chopping trees.",                              goal: log,              group: mining,       difficulty: easy}
- {id: 5,  type: collect, instruction: "Collect 8 blocks of dirt.",                                          goal: dirt,             group: mining,       difficulty: easy}
- {id: 6,  type: mine,    instruction: "Mine 8 cobblestone using a wooden pickaxe or better.",                goal: cobblestone,      group: mining,       difficulty: easy}
- {id: 7,  type: mine,    instruction: "Mine 3 coal ore using a wooden pickaxe or better.",                   goal: coal,             group: mining,       difficulty: medium}
- {id: 8,  type: mine,    instruction: "Find and mine diamond ore underground.",                              goal: diamond,          group: exploration,   difficulty: hard}
- {id: 9,  type: collect, instruction: "Find lava and collect it in a bucket.",                               goal: lava_bucket,      group: exploration,   difficulty: hard}
- {id: 10, type: collect, instruction: "Find a village and obtain an emerald.",                               goal: emerald,          group: exploration,   difficulty: hard}
- {id: 11, type: collect, instruction: "Find a forest and collect an oak sapling.",                           goal: oak_sapling,      group: exploration,   difficulty: hard}
- {id: 12, type: craft,   instruction: "Tech tree: bare hands → chop trees → planks → sticks → wooden pickaxe.", goal: wooden_pickaxe,   group: tech_tree,     difficulty: medium}
- {id: 13, type: craft,   instruction: "Tech tree: bare hands → logs → planks → sticks → table → wooden sword.", goal: wooden_sword,     group: tech_tree,     difficulty: medium}
- {id: 14, type: craft,   instruction: "Tech tree: stone pickaxe → mine iron ore → furnace → smelt → iron pickaxe.", goal: iron_pickaxe,  group: tech_tree,     difficulty: hard}
- {id: 15, type: craft,   instruction: "Tech tree: iron pickaxe → mine diamond → craft diamond pickaxe.",        goal: diamond_pickaxe,  group: tech_tree,     difficulty: hard}
- {id: 16, type: mine,    instruction: "Mine iron ore with wooden pickaxe → fails → switch to stone → obtain ore.", goal: iron_ore,       group: failure_recovery, difficulty: hard}
- {id: 17, type: smelt,   instruction: "Smelt iron ore without fuel → fails → gather coal → smelt into ingot.",     goal: iron_ingot,      group: failure_recovery, difficulty: hard}
- {id: 18, type: craft,   instruction: "8 cobblestone only. Choose: furnace OR stone pickaxe. Craft furnace.",     goal: furnace,          group: interaction_stress, difficulty: hard}
- {id: 19, type: craft,   instruction: "2 diamonds only. Choose: diamond pickaxe OR diamond sword. Craft pickaxe.", goal: diamond_pickaxe,  group: interaction_stress, difficulty: hard}

evaluate: []
