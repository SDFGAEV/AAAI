# @package _global_
# C-ACT E1: Knowledge Accumulation — 32 tasks x 8 seeds = 256 episodes
# All 6 groups at mix of difficulty levels
env:
  name: CACTTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

