- {id: 0,  type: craft,   instruction: "Craft oak planks from oak logs.",                                          goal: oak_planks,       group: crafting,    difficulty: easy}
- {id: 1,  type: craft,   instruction: "Craft a crafting table from planks.",                                    goal: crafting_table,   group: crafting,    difficulty: easy}
- {id: 2,  type: craft,   instruction: "Craft sticks from oak planks.",                                          goal: stick,            group: crafting,    difficulty: easy}
- {id: 3,  type: craft,   instruction: "Craft a ladder using sticks.",                                           goal: ladder,           group: crafting,    difficulty: easy}
- {id: 4,  type: craft,   instruction: "Craft a wooden pickaxe.",                                                goal: wooden_pickaxe,   group: crafting,    difficulty: easy}
- {id: 5,  type: craft,   instruction: "Craft a wooden axe.",                                                    goal: wooden_axe,       group: crafting,    difficulty: easy}
- {id: 6,  type: craft,   instruction: "Craft a furnace using 8 cobblestone.",                                   goal: furnace,          group: crafting,    difficulty: medium}
- {id: 7,  type: smelt,   instruction: "Smelt raw beef in a furnace to get cooked beef.",                         goal: cooked_beef,      group: crafting,    difficulty: medium}
