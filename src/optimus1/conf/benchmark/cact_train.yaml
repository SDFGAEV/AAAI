- {id: 20, type: craft,   instruction: "Tech tree: bare hands → chop trees → planks → sticks → wooden pickaxe.",  goal: wooden_pickaxe,   group: tech_tree,     difficulty: medium}
- {id: 21, type: craft,   instruction: "Tech tree: wooden pickaxe → mine cobblestone → craft stone pickaxe.",     goal: stone_pickaxe,    group: tech_tree,     difficulty: medium}
- {id: 22, type: craft,   instruction: "Tech tree: bare hands → logs → planks → sticks → table → wooden sword.",  goal: wooden_sword,     group: tech_tree,     difficulty: medium}
- {id: 23, type: craft,   instruction: "Tech tree: stone pickaxe → mine iron ore → furnace → smelt → iron pickaxe.", goal: iron_pickaxe,  group: tech_tree,     difficulty: hard}
