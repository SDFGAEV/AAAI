- {id: 14, type: mine,     instruction: "Mine 3 iron ore using a stone pickaxe or better.",                       goal: iron_ore,         group: mining,       difficulty: medium}
- {id: 15, type: mine,     instruction: "Mine diamond ore using an iron pickaxe or better.",                      goal: diamond,          group: mining,       difficulty: hard}
