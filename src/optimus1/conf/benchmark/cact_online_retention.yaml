# @package _global_
defaults:
  - _self_
# C-ACT E5: Retention tasks — 6 tasks for old capability preservation per round
env:
  name: CACTTaskEnv-v0
  max_minutes: 2
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
- {id: 0,  type: craft,   instruction: "Craft a furnace using 8 cobblestone.",                                goal: furnace,          group: crafting,    difficulty: medium}
- {id: 1,  type: mine,    instruction: "Mine 3 iron ore using a stone pickaxe or better.",                    goal: iron_ore,         group: mining,       difficulty: medium}
- {id: 2,  type: mine,    instruction: "Mine diamond ore using an iron pickaxe or better.",                   goal: diamond,          group: mining,       difficulty: hard}
- {id: 3,  type: mine,    instruction: "Mine iron ore with wooden pickaxe → fails → switch to stone → obtain ore.", goal: iron_ore,       group: failure_recovery, difficulty: hard}
- {id: 4,  type: smelt,   instruction: "Smelt iron ore without fuel → fails → gather coal → smelt into ingot.",     goal: iron_ingot,      group: failure_recovery, difficulty: hard}
- {id: 5,  type: craft,   instruction: "8 cobblestone only. Choose: furnace OR stone pickaxe. Craft furnace.",     goal: furnace,          group: interaction_stress, difficulty: hard}

evaluate: []
