# @package _global_
defaults:
  - _self_
# C-ACT E3: Strict Frozen Main Evaluation — 50 tasks x 8 seeds x 7 methods = 2800 episodes
# Groups: crafting(10) mining(9) exploration(6) tech_tree(10) failure_recovery(8) interaction_stress(7)
env:
  name: CACTTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
# ════════════════ Crafting (10) — routine skill reuse ════════════════
- {id: 0,  type: craft,   instruction: "Craft oak planks from oak logs.",                                          goal: oak_planks,       group: crafting,    difficulty: easy}
- {id: 1,  type: craft,   instruction: "Craft a crafting table from planks.",                                    goal: crafting_table,   group: crafting,    difficulty: easy}
- {id: 2,  type: craft,   instruction: "Craft sticks from oak planks.",                                          goal: stick,            group: crafting,    difficulty: easy}
- {id: 3,  type: craft,   instruction: "Craft a ladder using sticks.",                                           goal: ladder,           group: crafting,    difficulty: easy}
- {id: 4,  type: craft,   instruction: "Craft a wooden pickaxe.",                                                goal: wooden_pickaxe,   group: crafting,    difficulty: easy}
- {id: 5,  type: craft,   instruction: "Craft a wooden axe.",                                                    goal: wooden_axe,       group: crafting,    difficulty: easy}
- {id: 6,  type: craft,   instruction: "Craft a furnace using 8 cobblestone.",                                   goal: furnace,          group: crafting,    difficulty: medium}
- {id: 7,  type: smelt,   instruction: "Smelt raw beef in a furnace to get cooked beef.",                         goal: cooked_beef,      group: crafting,    difficulty: medium}
- {id: 8,  type: craft,   instruction: "Craft a stonecutter using iron ingot and stone.",                         goal: stonecutter,      group: crafting,    difficulty: medium}
- {id: 9,  type: craft,   instruction: "Craft an iron sword using iron ingots and sticks.",                       goal: iron_sword,       group: crafting,    difficulty: medium}

# ════════════════ Mining / Collecting (9) — tool selection ════════════════
- {id: 10, type: collect,  instruction: "Collect 8 wood logs by chopping trees.",                                 goal: log,              group: mining,       difficulty: easy}
- {id: 11, type: collect,  instruction: "Collect 8 blocks of dirt.",                                             goal: dirt,             group: mining,       difficulty: easy}
- {id: 12, type: collect,  instruction: "Collect 8 blocks of sand.",                                             goal: sand,             group: mining,       difficulty: easy}
- {id: 13, type: collect,  instruction: "Collect 8 blocks of gravel.",                                                goal: gravel,           group: mining,       difficulty: easy}
- {id: 14, type: mine,     instruction: "Mine 8 cobblestone using a wooden pickaxe or better.",                   goal: cobblestone,      group: mining,       difficulty: easy}
- {id: 15, type: mine,     instruction: "Mine 3 iron ore using a stone pickaxe or better.",                       goal: iron_ore,         group: mining,       difficulty: medium}
- {id: 16, type: mine,     instruction: "Mine 3 coal ore using a wooden pickaxe or better.",                      goal: coal,             group: mining,       difficulty: medium}
- {id: 17, type: mine,     instruction: "Mine diamond ore using an iron pickaxe or better.",                      goal: diamond,          group: mining,       difficulty: hard}
- {id: 18, type: mine,     instruction: "Mine obsidian using a diamond pickaxe.",                                 goal: obsidian,         group: mining,       difficulty: hard}

# ════════════════ Exploration (6) — all hard, positive control ════════════════
- {id: 19, type: mine,     instruction: "Find and mine diamond ore underground.",                                 goal: diamond,          group: exploration,   difficulty: hard}
- {id: 20, type: collect,  instruction: "Find lava and collect it in a bucket.",                                  goal: lava_bucket,      group: exploration,   difficulty: hard}
- {id: 21, type: collect,  instruction: "Find a village and obtain an emerald.",                                  goal: emerald,          group: exploration,   difficulty: hard}
- {id: 22, type: mine,     instruction: "Explore underground and mine a gold ore.",                               goal: gold_ore,         group: exploration,   difficulty: hard}
- {id: 23, type: collect,  instruction: "Explore to find a dungeon chest and obtain an iron ingot.",              goal: iron_ingot,       group: exploration,   difficulty: hard}
- {id: 24, type: collect,  instruction: "Find a forest and collect an oak sapling.",                              goal: oak_sapling,      group: exploration,   difficulty: hard}

# ════════════════ Tech Tree (10) — hierarchical dependency chains ════════════════
- {id: 25, type: craft,   instruction: "Tech tree: bare hands → chop trees → planks → sticks → wooden pickaxe.",  goal: wooden_pickaxe,   group: tech_tree,     difficulty: medium}
- {id: 26, type: craft,   instruction: "Tech tree: wooden pickaxe → mine cobblestone → craft stone pickaxe.",     goal: stone_pickaxe,    group: tech_tree,     difficulty: medium}
- {id: 27, type: craft,   instruction: "Tech tree: wooden pickaxe → cobblestone → craft stone axe.",              goal: stone_axe,        group: tech_tree,     difficulty: medium}
- {id: 28, type: craft,   instruction: "Tech tree: bare hands → logs → planks → sticks → table → wooden sword.",  goal: wooden_sword,     group: tech_tree,     difficulty: medium}
- {id: 29, type: craft,   instruction: "Tech tree: stone pickaxe → mine iron ore → furnace → smelt → iron pickaxe.", goal: iron_pickaxe,  group: tech_tree,     difficulty: hard}
- {id: 30, type: craft,   instruction: "Tech tree: iron pickaxe → mine diamond → craft diamond pickaxe.",         goal: diamond_pickaxe,  group: tech_tree,     difficulty: hard}
