# @package _global_
# ACT-RL E3: Strict Frozen Main Evaluation — 36 tasks x 8 seeds x 7 methods = 2016 episodes
# Groups: crafting(8) mining(7) exploration(6) tech_tree(7) failure_recovery(4) interaction_stress(4)
env:
  name: CACTTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
# ═══ Crafting / Tool Use (8) ═══
- id: 0
  type: craft
  instruction: Craft oak planks from oak logs.
  goal: oak_planks
  group: crafting
  difficulty: easy
- id: 1
  type: craft
  instruction: Craft a crafting table.
  goal: crafting_table
  group: crafting
  difficulty: easy
- id: 2
  type: craft
  instruction: Craft a ladder using sticks.
  goal: ladder
  group: crafting
  difficulty: easy
- id: 3
  type: craft
  instruction: Craft a furnace using 8 cobblestone.
  goal: furnace
  group: crafting
  difficulty: medium
- id: 4
  type: smelt
  instruction: Smelt raw beef in a furnace to get cooked beef.
  goal: cooked_beef
  group: crafting
  difficulty: medium
- id: 5
  type: craft
  instruction: Craft a shield.
  goal: shield
  group: crafting
  difficulty: medium
- id: 6
  type: craft
  instruction: Craft a bow.
  goal: bow
  group: crafting
  difficulty: medium
- id: 7
  type: craft
  instruction: Craft a stonecutter using iron ingot and stone.
  goal: stonecutter
  group: crafting
  difficulty: medium

# ═══ Mining / Collecting (7) ═══
- id: 8
  type: collect
  instruction: Collect 8 wood logs by chopping trees.
  goal: log
  group: mining
  difficulty: easy
- id: 9
  type: mine
  instruction: Mine 3 iron ore using a stone pickaxe or better.
  goal: iron_ore
  group: mining
  difficulty: medium
- id: 10
  type: mine
  instruction: Mine diamond ore using an iron pickaxe or better.
  goal: diamond
  group: mining
  difficulty: hard
- id: 11
  type: mine
  instruction: Mine obsidian using a diamond pickaxe.
  goal: obsidian
  group: mining
  difficulty: hard
- id: 12
  type: collect
  instruction: Collect 8 blocks of dirt.
  goal: dirt
  group: mining
  difficulty: easy
- id: 13
  type: collect
  instruction: Collect 8 blocks of grass.
  goal: grass
  group: mining
  difficulty: easy
- id: 14
  type: collect
  instruction: Collect 3 wool by shearing or killing sheep.
  goal: wool
  group: mining
  difficulty: easy

# ═══ Exploration / Finding (6) ═══
- id: 15
  type: mine
  instruction: Find and mine diamond ore underground.
  goal: diamond
  group: exploration
  difficulty: hard
- id: 16
  type: collect
  instruction: Find lava and collect it in a bucket.
  goal: lava_bucket
  group: exploration
  difficulty: hard
- id: 17
  type: collect
  instruction: Find a village and obtain an emerald.
  goal: emerald
  group: exploration
  difficulty: hard
- id: 18
  type: collect
  instruction: Find a forest and collect an oak sapling.
  goal: oak_sapling
  group: exploration
  difficulty: hard
- id: 19
  type: collect
  instruction: Explore to find a dungeon chest and obtain an iron ingot.
  goal: iron_ingot
  group: exploration
  difficulty: hard
- id: 20
  type: collect
  instruction: Explore underground and mine a gold ore.
  goal: gold_ore
  group: exploration
  difficulty: hard

# ═══ Long-Horizon / Tech Tree (7) ═══
- id: 21
  type: mine
  instruction: Mine obsidian for building a nether portal.
  goal: obsidian
  group: tech_tree
  difficulty: hard
- id: 22
  type: craft
  instruction: Craft a ladder from sticks.
  goal: ladder
  group: tech_tree
  difficulty: easy
- id: 23
  type: collect
  instruction: Collect 64 cobblestone for building a tower.
  goal: cobblestone
  group: tech_tree
  difficulty: medium
- id: 24
  type: craft
  instruction: "Tech tree: craft a wooden sword from scratch."
  goal: wooden_sword
  group: tech_tree
  difficulty: medium
- id: 25
  type: craft
  instruction: "Tech tree: craft a diamond sword from scratch."
  goal: diamond_sword
  group: tech_tree
  difficulty: hard
- id: 26
  type: craft
  instruction: Craft a diamond pickaxe.
  goal: diamond_pickaxe
  group: tech_tree
  difficulty: hard
- id: 27
  type: mine
  instruction: "Obtain obsidian: craft diamond pickaxe, find lava, mine obsidian."
  goal: obsidian
  group: tech_tree
  difficulty: hard

# ═══ Failure Recovery (4) ═══
- id: 28
  type: mine
  instruction: Attempt to mine iron ore with a wooden pickaxe. Discover you need stone. Switch and obtain iron ore.
  goal: iron_ore
  group: failure_recovery
  difficulty: hard
- id: 29
  type: mine
  instruction: Attempt to mine diamond ore with a stone pickaxe. Discover you need iron. Switch and obtain diamond.
  goal: diamond
  group: failure_recovery
  difficulty: hard
- id: 30
  type: smelt
  instruction: Attempt to smelt iron without fuel. Gather coal, then smelt into iron ingot.
  goal: iron_ingot
  group: failure_recovery
  difficulty: hard
- id: 31
  type: craft
  instruction: Attempt to craft a stone pickaxe without a crafting table. Learn you need one first, then craft it.
  goal: stone_pickaxe
  group: failure_recovery
  difficulty: hard

# ═══ Interaction Stress (4) ═══
- id: 32
  type: craft
  instruction: You have only 8 cobblestone. Both a furnace and a stone pickaxe need cobblestone. Choose one and craft it.
  goal: furnace
  group: interaction_stress
  difficulty: hard
- id: 33
  type: craft
  instruction: You have limited coal. Use it to craft torches for lighting.
  goal: torch
  group: interaction_stress
  difficulty: hard
- id: 34
  type: craft
  instruction: You have only 1 iron ingot. Choose: craft an iron pickaxe or an iron sword.
  goal: iron_pickaxe
  group: interaction_stress
  difficulty: hard
- id: 35
  type: craft
  instruction: You have limited diamonds. Choose: craft a diamond pickaxe or a diamond sword.
  goal: diamond_pickaxe
  group: interaction_stress
  difficulty: hard

evaluate: []
