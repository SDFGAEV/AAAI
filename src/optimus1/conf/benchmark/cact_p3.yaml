- {id: 32, type: craft,   instruction: "Tech tree: craft a shield using planks and an iron ingot.",               goal: shield,           group: tech_tree,     difficulty: medium}
- {id: 33, type: craft,   instruction: "Tech tree: craft a bow using sticks and string.",                         goal: bow,              group: tech_tree,     difficulty: medium}
- {id: 34, type: mine,    instruction: "Tech tree: iron pickaxe → diamond → diamond pickaxe → obsidian.",         goal: obsidian,         group: tech_tree,     difficulty: hard}

# ════════════════ Failure Recovery (8) — all hard, remedy reuse ════════════════
- {id: 35, type: mine,    instruction: "Mine iron ore with wooden pickaxe → fails → switch to stone → obtain ore.", goal: iron_ore,       group: failure_recovery, difficulty: hard}
- {id: 36, type: mine,    instruction: "Mine diamond with stone pickaxe → fails → switch to iron → obtain diamond.", goal: diamond,     group: failure_recovery, difficulty: hard}
- {id: 37, type: smelt,   instruction: "Smelt iron ore without fuel → fails → gather coal → smelt into ingot.",    goal: iron_ingot,      group: failure_recovery, difficulty: hard}
- {id: 38, type: craft,   instruction: "Craft stone pickaxe without table → fails → craft table first → then pickaxe.", goal: stone_pickaxe, group: failure_recovery, difficulty: hard}
- {id: 39, type: craft,   instruction: "Craft furnace without cobblestone → fails → mine cobblestone → craft furnace.", goal: furnace,  group: failure_recovery, difficulty: hard}
- {id: 40, type: smelt,   instruction: "Smelt raw beef with no furnace → fails → craft furnace first → then smelt.", goal: cooked_beef,  group: failure_recovery, difficulty: hard}
- {id: 41, type: craft,   instruction: "Craft iron pickaxe with no iron → fails → mine iron → smelt → craft pickaxe.", goal: iron_pickaxe, group: failure_recovery, difficulty: hard}
- {id: 42, type: craft,   instruction: "Craft stone axe after accidentally breaking your first one.",               goal: stone_axe,        group: failure_recovery, difficulty: hard}

