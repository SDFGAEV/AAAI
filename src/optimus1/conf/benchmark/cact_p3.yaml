- {id: 47, type: craft,   instruction: "1 iron ingot only. Choose: iron pickaxe OR iron sword. Craft the sword.",   goal: iron_sword,       group: interaction_stress, difficulty: hard}
- {id: 48, type: craft,   instruction: "2 diamonds only. Choose: diamond pickaxe OR diamond sword. Craft pickaxe.", goal: diamond_pickaxe,  group: interaction_stress, difficulty: hard}
- {id: 49, type: craft,   instruction: "2 diamonds only. Choose: diamond pickaxe OR diamond sword. Craft sword.",   goal: diamond_sword,    group: interaction_stress, difficulty: hard}

evaluate: []
