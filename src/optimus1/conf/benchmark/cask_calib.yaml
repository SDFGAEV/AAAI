# @package _global_
# CASK E2: Risk Calibration + Counterfactual Branching — 12 tasks × 8 seeds
# Mix of difficulty levels spanning low-risk to high-risk knowledge reuse
# Source: MCU benchmark task configs, adapted
env:
  name: CASKTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
# Low-risk tasks (knowledge is well-established)
- id: 0
  type: craft
  instruction: Craft oak planks from oak logs.
  goal: craft_oak_planks
- id: 1
  type: craft
  instruction: Craft a crafting table.
  goal: craft_crafting_table
- id: 2
  type: craft
  instruction: Craft sticks from oak planks.
  goal: craft_sticks

# Medium-risk tasks (requires tool progression)
- id: 3
  type: mine
  instruction: Mine 3 iron ore using a stone pickaxe.
  goal: mine_iron_ore
- id: 4
  type: smelt
  instruction: Smelt iron ore in a furnace to get iron ingots.
  goal: smelt_iron
- id: 5
  type: craft
  instruction: Craft an iron pickaxe using iron ingots and sticks.
  goal: craft_iron_pickaxe

# High-risk tasks (wrong tool / missing prerequisite common)
- id: 6
  type: mine
  instruction: Mine diamond ore using an iron pickaxe.
  goal: mine_diamond_ore
- id: 7
  type: craft
  instruction: Craft a stonecutter using iron ingot and stone.
  goal: craft_stonecut
- id: 8
  type: build
  instruction: Build a nether portal using obsidian and activate it with flint and steel.
  goal: build_nether_portal

# Interaction-prone tasks (resource conflicts likely)
- id: 9
  type: build
  instruction: Build a snow golem using snow blocks and a pumpkin.
  goal: build_snow_golem
- id: 10
  type: use
  instruction: Throw a snowball.
  goal: throw_a_snowball
- id: 11
  type: explore
  instruction: Explore the world by traveling across various biomes.
  goal: explore_run

evaluate: []
