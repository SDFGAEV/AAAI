# @package _global_
# ACT-RL E2: Adaptive Calibration — 12 tasks x 8 seeds
# Purpose: learn empirical priors, adaptive thresholds, interaction params
env:
  name: CASKTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
- id: 0
  type: craft
  instruction: Craft a ladder using sticks.
  goal: craft_ladder
  group: crafting
- id: 1
  type: craft
  instruction: Craft a furnace using 8 cobblestone.
  goal: craft_smelting
  group: crafting
- id: 2
  type: smelt
  instruction: Smelt raw beef in a furnace to get cooked beef.
  goal: smelt_beef
  group: crafting
- id: 3
  type: mine
  instruction: Mine 3 iron ore using a stone pickaxe or better.
  goal: mine_iron_ore
  group: mining
- id: 4
  type: mine
  instruction: Mine diamond ore using an iron pickaxe or better.
  goal: mine_diamond_ore
  group: mining
- id: 5
  type: collect
  instruction: Collect 3 wool by shearing or killing sheep.
  goal: collect_wool
  group: mining
- id: 6
  type: find
  instruction: Find diamond ore somewhere underground.
  goal: find_diamond
  group: exploration
- id: 7
  type: explore
  instruction: Explore the world by traveling across various biomes.
  goal: explore_chest
  group: exploration
- id: 8
  type: craft
  instruction: "Tech tree: from barehand to wooden sword."
  goal: techtree_from_barehand_to_wooden_sword
  group: tech_tree
- id: 9
  type: mine
  instruction: Attempt to mine iron ore with a wooden pickaxe. The wrong tool fails. Switch to a stone pickaxe.
  goal: wrong_tool_mine_iron
  group: failure_recovery
- id: 10
  type: craft
  instruction: Attempt to craft a stone pickaxe without a crafting table. Place the table first.
  goal: missing_table_for_crafting
  group: failure_recovery
- id: 11
  type: craft
  instruction: You have only 8 cobblestone. You need both a furnace and a stone pickaxe. Choose wisely.
  goal: limited_cobble_pickaxe_vs_furnace
  group: interaction_stress

evaluate: []
