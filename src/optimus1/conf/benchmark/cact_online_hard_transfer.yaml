# @package _global_
defaults:
  - _self_
# C-ACT E5: Hard-Transfer tasks — 6 tasks for knowledge growth validation per round
env:
  name: CACTTaskEnv-v0
  max_minutes: 3
  times: 1
  prefer_biome: forest
  initial_inventory: []

all_task:
- {id: 0,  type: craft,   instruction: "Tech tree: iron pickaxe → mine diamond → craft diamond pickaxe.",        goal: diamond_pickaxe,  group: tech_tree,     difficulty: hard}
- {id: 1,  type: mine,    instruction: "Tech tree: iron pickaxe → diamond → diamond pickaxe → obsidian.",        goal: obsidian,         group: tech_tree,     difficulty: hard}
- {id: 2,  type: mine,    instruction: "Mine diamond with stone pickaxe → fails → switch to iron → obtain diamond.", goal: diamond,     group: failure_recovery, difficulty: hard}
- {id: 3,  type: craft,   instruction: "1 iron ingot only. Choose: iron pickaxe for mining OR iron sword. Craft the pickaxe.", goal: iron_pickaxe, group: interaction_stress, difficulty: hard}
- {id: 4,  type: craft,   instruction: "2 diamonds only. Choose: diamond pickaxe OR diamond sword. Craft pickaxe.", goal: diamond_pickaxe,  group: interaction_stress, difficulty: hard}
- {id: 5,  type: craft,   instruction: "Tech tree: stone pickaxe → iron ore → smelt → iron ingot → iron sword.", goal: iron_sword,       group: tech_tree,     difficulty: hard}

evaluate: []
